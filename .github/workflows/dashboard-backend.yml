name: dashboard-backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard-backend/**'
      - '.github/workflows/dashboard-backend.yml'
  pull_request:
    paths:
      - 'apps/dashboard-backend/**'
      - '.github/workflows/dashboard-backend.yml'

env:
  ECR_REGISTRY: 611058323802.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: aegis/dashboard-backend
  AWS_REGION: ap-south-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            apps/dashboard-backend/requirements.txt
            apps/dashboard-backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  build-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_DASHBOARD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:sha-$SHORT_SHA \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            apps/dashboard-backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:sha-$SHORT_SHA
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

name: dashboard-web

on:
  push:
    branches: [main]
    paths:
      - "apps/dashboard-web/**"
      - ".github/workflows/dashboard-web.yml"
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: apps/dashboard-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_WS_BASE_URL: ${{ vars.VITE_WS_BASE_URL }}
          VITE_COGNITO_AUTHORITY: ${{ vars.VITE_COGNITO_AUTHORITY }}
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REDIRECT_URI: ${{ vars.VITE_COGNITO_REDIRECT_URI }}
          VITE_COGNITO_LOGOUT_URI: ${{ vars.VITE_COGNITO_LOGOUT_URI }}
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_DASHBOARD_WEB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync dist/ to S3
        run: |
          aws s3 sync dist/ "s3://${{ vars.DASHBOARD_WEB_BUCKET }}/" \
            --delete \
            --region "${{ env.AWS_REGION }}"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.DASHBOARD_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
